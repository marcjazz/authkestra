name: Publish Rust Crates

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment
        required: false
        default: pre-prod
        type: string

  release:
    types: [created]

jobs:
  publish-foundation:
    name: Publish foundation / ${{ matrix.crate }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.deploy_environment || 'pre-prod' }}
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        crate:
          - authkestra-engine
          - authkestra-macros

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: bash .github/scripts/publish-crate.sh "${{ matrix.crate }}"

  publish-core:
    name: Publish core / ${{ matrix.crate }}
    runs-on: ubuntu-latest
    needs: publish-foundation
    environment: ${{ github.event.inputs.deploy_environment || 'pre-prod' }}
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        crate:
          - authkestra-session
          - authkestra-resource
          - authkestra-providers
          - authkestra-oidc
          - authkestra-op

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: bash .github/scripts/publish-crate.sh "${{ matrix.crate }}"

  publish-frameworks:
    name: Publish frameworks / ${{ matrix.crate }}
    runs-on: ubuntu-latest
    needs: publish-core
    environment: ${{ github.event.inputs.deploy_environment || 'pre-prod' }}
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        crate:
          - authkestra-axum
          - authkestra-actix

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: bash .github/scripts/publish-crate.sh "${{ matrix.crate }}"

  publish-root:
    name: Publish root / ${{ matrix.crate }}
    runs-on: ubuntu-latest
    needs: publish-frameworks
    environment: ${{ github.event.inputs.deploy_environment || 'pre-prod' }}
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        crate:
          - authkestra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: bash .github/scripts/publish-crate.sh "${{ matrix.crate }}"
