services:
  redis:
    image: redis:7.2-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: authkestra
      POSTGRES_PASSWORD: password
      POSTGRES_DB: authkestra_test
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: authkestra_test
      MYSQL_USER: authkestra
      MYSQL_PASSWORD: password
    ports:
      - '3306:3306'
    volumes:
      - mysqldata:/var/lib/mysql
    restart: always

volumes:
  redisdata:
  pgdata:
  mysqldata: